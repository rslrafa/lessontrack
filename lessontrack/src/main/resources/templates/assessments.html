<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>LessonTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">

  <h1>Quiz, Activity, and Milestone Tracker</h1>

  <a href="/dashboard" class="btn btn-dark mb-3">Dashboard</a>
  <a href="/subjects" class="btn btn-secondary mb-3">Subjects</a>
  <a href="/lessons" class="btn btn-secondary mb-3">Lessons</a>
  <a href="/assessments/new" class="btn btn-primary mb-3">Add Assessment</a>

  <table class="table table-bordered table-striped">
    <thead>
    <tr>
      <th>Subject</th>
      <th>Title</th>
      <th>Type</th>
      <th>Due Date</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="assessment : ${assessments}">
      <td th:text="${assessment.subject.subjectCode + ' - ' + assessment.subject.subjectName}"></td>
      <td th:text="${assessment.title}"></td>
      <td th:text="${assessment.type}"></td>
      <td th:text="${assessment.dueDate}"></td>
      <td th:text="${assessment.status}"></td>
      <td>
        <a th:href="@{/assessments/edit/{id}(id=${assessment.id})}" class="btn btn-warning btn-sm">Edit</a>
        <a th:href="@{/assessments/delete/{id}(id=${assessment.id})}" class="btn btn-danger btn-sm"
           onclick="return confirm('Are you sure you want to delete this assessment?')">Delete</a>
      </td>
    </tr>
    </tbody>
  </table>

</div>
</body>
</html>
