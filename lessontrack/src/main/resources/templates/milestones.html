<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lessons | LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1 class="mb-4">Academic Milestones</h1>

    <div class="mb-4">
        <a href="/dashboard" class="btn btn-dark">Dashboard</a>
        <a href="/subjects" class="btn btn-primary">Subjects</a>
        <a href="/lessons" class="btn btn-secondary">Lessons</a>
        <a href="/assessments" class="btn btn-secondary">Assessments</a>
    </div>

    <h3>Upcoming Lessons - Next 30 Days</h3>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Date</th>
            <th>Subject</th>
            <th>Lesson</th>
            <th>Topic</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="lesson : ${upcomingLessons}">
            <td th:text="${lesson.lessonDate}"></td>
            <td th:text="${lesson.subject.subjectCode}"></td>
            <td th:text="${lesson.lessonTitle}"></td>
            <td th:text="${lesson.topic}"></td>
            <td th:text="${lesson.status}"></td>
        </tr>
        </tbody>
    </table>

    <h3 class="mt-5">Upcoming Quizzes, Activities, Exams, and Project Deadlines</h3>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Due Date</th>
            <th>Subject</th>
            <th>Title</th>
            <th>Type</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="assessment : ${upcomingAssessments}">
            <td th:text="${assessment.dueDate}"></td>
            <td th:text="${assessment.subject.subjectCode}"></td>
            <td th:text="${assessment.title}"></td>
            <td th:text="${assessment.type}"></td>
            <td th:text="${assessment.status}"></td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
