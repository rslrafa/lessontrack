<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1>Lesson Form</h1>

    <form th:action="@{/lessons}" th:object="${lesson}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <select th:field="*{subject}" class="form-control" required>
                <option value="">-- Select Subject --</option>
                <option th:each="subject : ${subjects}"
                        th:value="${subject.id}"
                        th:text="${subject.subjectCode + ' - ' + subject.subjectName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Lesson Title</label>
            <input type="text" th:field="*{lessonTitle}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Lesson Date</label>
            <input type="date" th:field="*{lessonDate}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Topic</label>
            <input type="text" th:field="*{topic}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Learning Outcomes</label>
            <textarea th:field="*{learningOutcomes}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Materials</label>
            <input type="text" th:field="*{materials}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="">-- Select Status --</option>
                <option value="Planned">Planned</option>
                <option value="Completed">Completed</option>
                <option value="Rescheduled">Rescheduled</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/lessons" class="btn btn-secondary">Cancel</a>

    </form>

</div>
</body>
</html>
