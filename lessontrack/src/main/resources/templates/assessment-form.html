<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1>Assessment Form</h1>

    <form th:action="@{/assessments}" th:object="${assessment}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <select th:field="*{subject}" class="form-control" required>
                <option value="">-- Select Subject --</option>
                <option th:each="subject : ${subjects}"
                        th:value="${subject.id}"
                        th:text="${subject.subjectCode + ' - ' + subject.subjectName}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Assessment Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Type</label>
            <select th:field="*{type}" class="form-control" required>
                <option value="">-- Select Type --</option>
                <option value="Quiz">Quiz</option>
                <option value="Activity">Activity</option>
                <option value="Laboratory">Laboratory</option>
                <option value="Assignment">Assignment</option>
                <option value="Exam">Exam</option>
                <option value="Project Milestone">Project Milestone</option>
                <option value="Presentation">Presentation</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" th:field="*{dueDate}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <select th:field="*{status}" class="form-control" required>
                <option value="">-- Select Status --</option>
                <option value="Upcoming">Upcoming</option>
                <option value="Completed">Completed</option>
                <option value="Missed">Missed</option>
                <option value="Rescheduled">Rescheduled</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/assessments" class="btn btn-secondary">Cancel</a>

    </form>

</div>
</body>
</html>
