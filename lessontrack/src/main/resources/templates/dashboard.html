<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard | LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1 class="page-title">Dashboard</h1>
    <p class="text-muted">Overview of your subjects, lessons, assessments, and academic milestones.</p>

    <div class="row g-4 mb-5">

        <div class="col-md-3">
            <div class="card card-stat text-center">
                <div class="card-body">
                    <h6 class="text-muted">Total Subjects</h6>
                    <h2 th:text="${totalSubjects}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-stat text-center">
                <div class="card-body">
                    <h6 class="text-muted">Total Lessons</h6>
                    <h2 th:text="${totalLessons}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-stat text-center">
                <div class="card-body">
                    <h6 class="text-muted">Completed Lessons</h6>
                    <h2 th:text="${completedLessons}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-stat text-center">
                <div class="card-body">
                    <h6 class="text-muted">Pending Assessments</h6>
                    <h2 th:text="${pendingAssessments}">0</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card mb-4">
        <div class="card-header fw-bold">Lessons This Week</div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Subject</th>
                    <th>Lesson</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="lesson : ${lessonsThisWeek}">
                    <td th:text="${lesson.lessonDate}"></td>
                    <td th:text="${lesson.subject.subjectCode}"></td>
                    <td th:text="${lesson.lessonTitle}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${lesson.status}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-header fw-bold">Upcoming Assessments</div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Due Date</th>
                    <th>Subject</th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="assessment : ${upcomingAssessments}">
                    <td th:text="${assessment.dueDate}"></td>
                    <td th:text="${assessment.subject.subjectCode}"></td>
                    <td th:text="${assessment.title}"></td>
                    <td th:text="${assessment.type}"></td>
                    <td>
                        <span class="badge bg-warning text-dark" th:text="${assessment.status}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
