<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lessons | LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">

    <h1>Lesson Management</h1>

    <a href="/dashboard" class="btn btn-dark mb-3">Dashboard</a>
    <a href="/subjects" class="btn btn-secondary mb-3">Subjects</a>
    <a href="/lessons/new" class="btn btn-primary mb-3">Add Lesson</a>
    <a href="/assessments" class="btn btn-secondary mb-3">Assessments</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Subject</th>
            <th>Lesson Title</th>
            <th>Date</th>
            <th>Topic</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="lesson : ${lessons}">
            <td th:text="${lesson.subject.subjectCode + ' - ' + lesson.subject.subjectName}"></td>
            <td th:text="${lesson.lessonTitle}"></td>
            <td th:text="${lesson.lessonDate}"></td>
            <td th:text="${lesson.topic}"></td>
            <td th:text="${lesson.status}"></td>
            <td>
                <a th:href="@{/lessons/edit/{id}(id=${lesson.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/lessons/delete/{id}(id=${lesson.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this lesson?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
