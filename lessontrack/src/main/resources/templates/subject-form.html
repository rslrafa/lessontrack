<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">

    <h1>Subject Form</h1>

    <form th:action="@{/subjects}" th:object="${subject}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Subject Code</label>
            <input type="text" th:field="*{subjectCode}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Subject Name</label>
            <input type="text" th:field="*{subjectName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Section</label>
            <input type="text" th:field="*{section}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Semester</label>
            <input type="text" th:field="*{semester}" class="form-control" placeholder="1st Semester">
        </div>

        <div class="mb-3">
            <label class="form-label">School Year</label>
            <input type="text" th:field="*{schoolYear}" class="form-control" placeholder="2025-2026">
        </div>

        <button type="submit" class="btn btn-success">Save</button>
        <a href="/subjects" class="btn btn-secondary">Cancel</a>

    </form>

</div>
</body>
</html>
