<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LessonTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1>Subject Management</h1>

    <a href="/dashboard" class="btn btn-dark mb-3">Dashboard</a>
    <a href="/subjects/new" class="btn btn-primary mb-3">Add Subject</a>
    <a href="/lessons" class="btn btn-secondary mb-3">Lessons</a>
    <a href="/assessments" class="btn btn-secondary mb-3">Assessments</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Subject Code</th>
            <th>Subject Name</th>
            <th>Section</th>
            <th>Semester</th>
            <th>School Year</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="subject : ${subjects}">
            <td th:text="${subject.subjectCode}"></td>
            <td th:text="${subject.subjectName}"></td>
            <td th:text="${subject.section}"></td>
            <td th:text="${subject.semester}"></td>
            <td th:text="${subject.schoolYear}"></td>
            <td>
                <a th:href="@{/subjects/edit/{id}(id=${subject.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/subjects/delete/{id}(id=${subject.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this subject?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
